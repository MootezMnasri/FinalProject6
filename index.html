<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tax Calculator</title>
    <link rel="icon" href="favicon.ico">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>Tax Calculator</h1>
        <p class="subtitle">Calculate your federal income tax quickly and easily.</p>
        <form id="taxForm">
            <label for="income">Annual Gross Income ($)</label>
            <input type="number" id="income" name="income" placeholder="e.g. 75000" min="0" step="0.01" required>
            <button type="submit">Calculate Tax</button>
        </form>
        <p class="error" id="errorMsg"></p>
        <div class="result" id="resultSection">
            <h2>Tax Breakdown</h2>
            <div id="resultContent"></div>
        </div>
    </div>
    <script src="taxCalculator.js"></script>
    <script src="script.js"></script>
</body>
</html>
