apiVersion: tekton.dev/v1beta1
kind: Pipeline
metadata:
  name: tax-calculator-pipeline
spec:
  params:
    - name: repo-url
      type: string
      description: The Git repository URL
    - name: branch
      type: string
      default: main
      description: The branch to build
    - name: image-name
      type: string
      description: Full image name including registry (e.g. us.icr.io/my-ns/tax-calculator)

  workspaces:
    - name: shared-workspace

  tasks:
    # ── 1. Clone the repository ────────────────────────────
    - name: clone
      taskRef:
        name: git-clone
      params:
        - name: url
          value: $(params.repo-url)
        - name: revision
          value: $(params.branch)
      workspaces:
        - name: output
          workspace: shared-workspace

    # ── 2. Install npm dependencies ────────────────────────
    - name: npminstall
      runAfter:
        - clone
      taskRef:
        name: npm
      params:
        - name: ARGS
          value: "install"
      workspaces:
        - name: source
          workspace: shared-workspace

    # ── 3. Run Jasmine unit tests ──────────────────────────
    - name: tests
      runAfter:
        - npminstall
      taskRef:
        name: jasmine
      workspaces:
        - name: source
          workspace: shared-workspace

    # ── 4. Build & push container image ────────────────────
    - name: build
      runAfter:
        - tests
      taskRef:
        name: buildah
      params:
        - name: IMAGE
          value: $(params.image-name)
      workspaces:
        - name: source
          workspace: shared-workspace

    # ── 5. Deploy to IBM Cloud Code Engine ─────────────────
    - name: deploy
      runAfter:
        - build
      taskRef:
        name: deploy-to-code-engine
      params:
        - name: IMAGE
          value: $(params.image-name)
      workspaces:
        - name: source
          workspace: shared-workspace
